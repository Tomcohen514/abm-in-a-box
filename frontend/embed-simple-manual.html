<!-- ================================================================
     AWS Event-in-a-Box - User Login Version
     ================================================================

     Features:
     - User authentication via email + password (NO SECRETS IN HTML!)
     - Login modal appears on page load
     - User enters both email and password manually
     - Generates KS via user.loginByLoginId API
     - Full form features (speakers, sessions)
     - Secure authentication flow

     SETUP:
     1. Embed on KMS custom HTML page
     2. User enters email + password in login modal
     3. KS generated via their credentials (no admin secret needed)
     4. Create event with speakers and sessions

     Version: 3.1.0 (User Login - Manual Entry)
     ================================================================ -->

<script>
(function() {
  'use strict';

  var CONFIG = {
    PARTNER_ID: 5620062,
    EP_API_BASE: 'https://events-api.nvp1.ovp.kaltura.com',
    EPM_API_BASE: 'https://epm.nvp1.ovp.kaltura.com',
    KALTURA_API: 'https://www.kaltura.com/api_v3',
    TEMPLATE_ID: 'tm0000'
  };

  var tokens = { ks: null, jwt: null };
  var speakerCount = 0;
  var sessionCount = 0;
  var speakerRegistry = {}; // cardId -> display label
  var _seq = 0;

  /* ================================================================== */
  /* HELPERS                                                             */
  /* ================================================================== */
  function uid() {
    return Math.random().toString(36).slice(2, 8) + (++_seq);
  }

  function mkToolbar(eid) {
    function tb(title, cmd, svgBody) {
      return '<button class="kms-ef-tb-btn" title="' + title + '" ' +
        'onmousedown="event.preventDefault();kmsEf.exec(\'' + eid + '\',\'' + cmd + '\')">' +
        '<svg width="14" height="14" viewBox="0 0 14 14">' + svgBody + '</svg></button>';
    }
    var sep = '<div class="kms-ef-tb-sep"></div>';
    return tb('Bold', 'bold', '<text x="2" y="12" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="currentColor">B</text>') +
      tb('Italic', 'italic', '<text x="4" y="12" font-family="Georgia,serif" font-size="13" font-style="italic" fill="currentColor">I</text>') +

  function blockImages(el) {
    el.addEventListener('paste', function(e) {
      var items = (e.clipboardData || {}).items || [];
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') === 0) { e.preventDefault(); return; }
      }
      e.preventDefault();
      var html = e.clipboardData.getData('text/html');
      var text = e.clipboardData.getData('text/plain');
      if (html) {
        var tmp = document.createElement('div');
        tmp.innerHTML = html;
        tmp.querySelectorAll('img').forEach(function(img) { img.parentNode.removeChild(img); });
        document.execCommand('insertHTML', false, tmp.innerHTML);
      } else {
        document.execCommand('insertText', false, text);
      }
    });
  }

  function wireImagePreview(fileId, prevId) {
    document.getElementById(fileId).addEventListener('change', function(e) {
      var file = e.target.files[0];
      var prev = document.getElementById(prevId);
      if (!file) { prev.innerHTML = 'No image selected'; return; }
      if (!file.type.match(/^image\//)) {
        prev.innerHTML = '<span style="color:#ef4444">Please select an image file.</span>';
        return;
      }
      var r = new FileReader();
      r.onload = function(ev) {
        prev.innerHTML = '<img src="' + ev.target.result + '" alt="Preview">';
      };
      r.readAsDataURL(file);
    });
  }

  function refreshAllSpeakerDropdowns() {
    var lists = document.querySelectorAll('[data-splist="true"]');
    for (var i = 0; i < lists.length; i++) {
      var list = lists[i];
      var triggerId = list.getAttribute('data-trigger');
      var selectedIds = [];
      var tags = document.querySelectorAll('#' + triggerId + ' .kms-ef-ms-tag');
      for (var j = 0; j < tags.length; j++) {
        selectedIds.push(tags[j].getAttribute('data-spid'));
      }
      rebuildSpeakerList(list, triggerId, selectedIds);
    }
  }

  function rebuildSpeakerList(listEl, triggerId, selectedIds) {
    var keys = Object.keys(speakerRegistry);
    if (keys.length === 0) {
      listEl.innerHTML = '<div class="kms-ef-ms-empty">No speakers added yet</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < keys.length; i++) {
      var cid = keys[i];
      var label = speakerRegistry[cid];
      var checked = selectedIds.indexOf(cid) !== -1;
      html += '<div class="kms-ef-ms-item ' + (checked ? 'kms-ef-ms-checked' : '') + '" ' +
        'onclick="kmsEf.msDdToggleItem(\'' + triggerId + '\',\'' + cid + '\',\'' + label.replace(/'/g, "\\'") + '\')">' +
        '<span class="kms-ef-ms-check"></span>' +
        '<span>' + label + '</span></div>';
    }
    listEl.innerHTML = html;
  }

      document.getElementById(labelId).textContent = val;
      document.getElementById(triggerId).classList.remove('kms-ef-open');
      document.getElementById(listId).classList.remove('kms-ef-open');
      if (badgeId) {

        badge.textContent = val;
        badge.className = 'kms-ef-ss-badge ' + (val === 'Live Webcast' ? 'kms-ef-badge-live' : 'kms-ef-badge-prerecorded');

      var t = document.getElementById(triggerId);
      var l = document.getElementById(listId);
      t.classList.toggle('kms-ef-open');
      l.classList.toggle('kms-ef-open');
    },
    msDdToggleItem: function(triggerId, spid, label) {
      var trigger = document.getElementById(triggerId);
      var existingTag = trigger.querySelector('[data-spid="' + spid + '"]');
      if (existingTag) {
        existingTag.parentNode.removeChild(existingTag);
      } else {
        var placeholder = trigger.querySelector('.kms-ef-ms-placeholder');
        if (placeholder) placeholder.parentNode.removeChild(placeholder);
        var tag = document.createElement('span');
        tag.className = 'kms-ef-ms-tag';
        tag.setAttribute('data-spid', spid);
        tag.innerHTML = label + '<span class="kms-ef-ms-tag-x" onclick="event.stopPropagation();kmsEf.msDdRemoveTag(\'' + triggerId + '\',\'' + spid + '\')">×</span>';
        trigger.appendChild(tag);
      }
      var list = document.querySelector('[data-trigger="' + triggerId + '"]');
      var selectedIds = [];
      var tags = trigger.querySelectorAll('.kms-ef-ms-tag');
      for (var i = 0; i < tags.length; i++) {
        selectedIds.push(tags[i].getAttribute('data-spid'));
      }
      rebuildSpeakerList(list, triggerId, selectedIds);
    },
    msDdRemoveTag: function(triggerId, spid) {
      var trigger = document.getElementById(triggerId);
      var tag = trigger.querySelector('[data-spid="' + spid + '"]');
      if (tag) tag.parentNode.removeChild(tag);
      var tags = trigger.querySelectorAll('.kms-ef-ms-tag');
      if (tags.length === 0) {
        var placeholder = document.createElement('span');
        placeholder.className = 'kms-ef-ms-placeholder';
        placeholder.textContent = 'Select speakers…';
        trigger.appendChild(placeholder);
      }
      var list = document.querySelector('[data-trigger="' + triggerId + '"]');
      var selectedIds = [];
      for (var i = 0; i < tags.length; i++) {
        selectedIds.push(tags[i].getAttribute('data-spid'));
      }
      rebuildSpeakerList(list, triggerId, selectedIds);
    }
  };

  /* ================================================================== */
  /* AUTH - User Login (No Secrets!)                                     */
  /* ================================================================== */
  async function loginByCredentials(email, password) {
    var url = CONFIG.KALTURA_API + '/service/user/action/loginByLoginId?format=1';

    var params = new URLSearchParams();
    params.append('loginId', email);
    params.append('password', password);
    params.append('partnerId', CONFIG.PARTNER_ID);
    params.append('expiry', '86400');
    params.append('privileges', 'all:*,disableentitlement');

    var response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    });

    var text = await response.text();

    // Check for error response (JSON format)
    try {
      var json = JSON.parse(text);
      if (json.code || json.message) {
        throw new Error(json.message || 'Login failed');
      }
    } catch (e) {
      // If it's not JSON, it's the KS token (success)
      if (!text.startsWith('djJ8')) {
        throw new Error('Invalid response from login API');
      }
    }

    // Remove quotes if present
    var ks = text.replace(/^"|"$/g, '');
    return ks;
  }

  async function generateJWT(ks) {
    var response = await fetch(CONFIG.EPM_API_BASE + '/epm/auth/loginKS', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ks: ks })
    });
    var data = await response.json();
    return data.token;
  }

  /* ================================================================== */
  async function createEvent() {
    var btn = document.getElementById('createEventBtn');
    btn.disabled = true;
    btn.textContent = 'Creating...';

    try {
      var title = document.getElementById('eventTitle').value.trim();
      var description = document.getElementById('eventDesc').innerHTML.trim();

      if (!title || !description) {
        alert('Please fill in event title and description');
        return;
      }

      // Create event payload
      var now = new Date();
      var startDate = new Date(now.getTime() + 24 * 60 * 60 * 1000);  // Tomorrow
      var endDate = new Date(startDate.getTime() + 2 * 60 * 60 * 1000);  // 2 hours later

      var payload = {
        templateId: CONFIG.TEMPLATE_ID,
        name: title,
        description: description,
        startDate: startDate.toISOString(),
        endDate: endDate.toISOString(),
        timezone: 'America/New_York'
      };

      // Call EPM Internal API
      var response = await fetch(CONFIG.EPM_API_BASE + '/epm/events/create', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + tokens.jwt
        },
        body: JSON.stringify({ event: payload })
      });

      var result = await response.json();

      if (!response.ok) {
        throw new Error(result.error || 'Event creation failed');
      }

      var eventId = result.event?._id || result.event?.id;
      var epUrl = 'https://eventplatform.kaltura.com/' + eventId + '/overview';

      var status = document.getElementById('resultStatus');
      status.className = 'kms-ef-status kms-ef-success';
      status.innerHTML =
        '<strong>✓ Event Created Successfully!</strong><br><br>' +
        '<strong>Event ID:</strong> ' + eventId + '<br>' +
        '<strong>URL:</strong> <a href="' + epUrl + '" target="_blank">' + epUrl + '</a><br><br>' +
        '<em>Note: Speakers and sessions will be added in a future version.</em>';

    } catch (error) {
      var status = document.getElementById('resultStatus');
      status.className = 'kms-ef-status kms-ef-fail';
      status.innerHTML = '<strong>Error:</strong> ' + error.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Event';
    }
  }

  /* ================================================================== */
  /* INIT & LOGIN                                                        */
  /* ================================================================== */
  function initLogin() {
    // Show login modal on page load
    document.getElementById('loginModal').classList.remove('kms-ef-hidden');
    console.log('Showing login modal - user must enter credentials');
  }

  /* ================================================================== */
  /* EVENT HANDLERS                                                      */
  /* ================================================================== */

  // Login button handler
  document.getElementById('loginBtn').addEventListener('click', async function() {
    var btn = this;
    var loginStatus = document.getElementById('loginStatus');

    btn.disabled = true;
    btn.textContent = 'Signing In...';

    // Clear previous status
    loginStatus.className = 'kms-ef-status';
    loginStatus.innerHTML = '';

    try {
      var email = document.getElementById('loginEmail').value.trim();
      var password = document.getElementById('loginPassword').value.trim();

      if (!email || !password) {
        throw new Error('Please enter both email and password');
      }

      // Login via Kaltura API (generates KS with user's credentials)
      console.log('Logging in as:', email);
      tokens.ks = await loginByCredentials(email, password);
      console.log('✓ KS generated via login:', tokens.ks.substring(0, 30) + '...');

      // Generate JWT from KS
      console.log('Generating JWT...');
      tokens.jwt = await generateJWT(tokens.ks);
      console.log('✓ JWT generated');

      // Hide login modal
      document.getElementById('loginModal').classList.add('kms-ef-hidden');

      // Show main form
      document.getElementById('mainForm').style.display = 'block';

      // Initialize event description toolbar
      document.getElementById('eventDescToolbar').innerHTML = mkToolbar('eventDesc');
      blockImages(document.getElementById('eventDesc'));

      console.log('✓ Authentication complete - form ready');

    } catch (error) {
      console.error('Login failed:', error);

      // Show error message
      loginStatus.className = 'kms-ef-status kms-ef-fail';
      loginStatus.innerHTML = '<strong>✗ Login failed:</strong> ' + error.message + '<br>' +
        '<small>Please check your email and password and try again.</small>';

      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  // Enter key support for login form
  document.getElementById('loginPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('loginBtn').click();
    }
  });

  document.getElementById('addSpeakerBtn').addEventListener('click', addSpeaker);
  document.getElementById('addSessionBtn').addEventListener('click', addSession);
  document.getElementById('createEventBtn').addEventListener('click', createEvent);
  document.getElementById('cancelBtn').addEventListener('click', function() {
    if (confirm('Cancel and reset form?')) {
      location.reload();
    }
  });

  // Show login modal on page load
  initLogin();

})();
</script>

  NOTES - USER LOGIN VERSION:

  Authentication Flow:
  1. Page loads → Login modal appears automatically
  2. User manually enters email + password
  3. Call: POST /service/user/action/loginByLoginId
     - loginId: user email
     - password: user password
     - partnerId: 5620062
     - privileges: all:*,disableentitlement
     - expiry: 86400 (24 hours)
  4. API returns KS token (or error)
